<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Session Rename Review / Codex 会话重命名审核</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --panel: #181b20;
      --panel-2: #111419;
      --muted: #a8adb7;
      --text: #f4f5f7;
      --line: #303640;
      --accent: #43c7b7;
      --accent-2: #78a6ff;
      --warn: #f5b85f;
      --danger: #ff746b;
      --ok: #74d58c;
      --shadow: rgba(0, 0, 0, 0.26);
      --control: #242934;
      --input: #0d1015;
      --chip: #141820;
      --context-bg: #0b0e13;
      --primary-fg: #071311;
    }
    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-2: #f0f3f7;
      --muted: #626b77;
      --text: #171a1f;
      --line: #d8dee7;
      --accent: #087f72;
      --accent-2: #255fc7;
      --warn: #95621a;
      --danger: #b23a31;
      --ok: #1f7a3c;
      --shadow: rgba(18, 28, 45, 0.08);
      --control: #ffffff;
      --input: #ffffff;
      --chip: #ffffff;
      --context-bg: #f8fafc;
      --primary-fg: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    header, main { max-width: 1240px; margin: 0 auto; padding: 22px; }
    header { border-bottom: 1px solid var(--line); }
    .header-top {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    h1 { margin: 0 0 10px; font-size: 23px; font-weight: 680; letter-spacing: 0; }
    .header-top h1 { margin: 0; }
    .prefs {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    button, input, select {
      font: inherit;
    }
    button {
      border: 1px solid var(--line);
      background: var(--control);
      color: var(--text);
      border-radius: 7px;
      padding: 8px 12px;
      cursor: pointer;
      min-height: 36px;
    }
    button.primary { background: var(--accent); color: var(--primary-fg); border-color: var(--accent); }
    button.subtle { background: transparent; }
    button:disabled { opacity: 0.55; cursor: wait; }
    button:hover:not(:disabled) { filter: brightness(1.08); }
    input[type="text"], input[type="number"], input[type="password"], select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px 9px;
      background: var(--input);
      color: var(--text);
      min-height: 36px;
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }
    .meta, .toolbar, .filters {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      align-items: center;
    }
    .meta { color: var(--muted); font-size: 13px; }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: var(--chip);
    }
    .toolbar { margin-bottom: 12px; }
    .main-toolbar {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .config-panel {
      display: grid;
      gap: 12px;
      margin: 0 0 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .config-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .remote-host-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .remote-host-option {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      min-height: 34px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--chip);
    }
    .remote-host-option span {
      font-size: 13px;
    }
    .remote-host-manual {
      flex: 1 1 260px;
      min-width: min(100%, 220px);
    }
    .tool-drawer {
      margin: 0 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .tool-drawer > summary {
      cursor: pointer;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 13px;
      user-select: none;
    }
    .tool-drawer-body {
      display: grid;
      gap: 10px;
      padding: 0 12px 12px;
    }
    .tool-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .group-title {
      min-width: 78px;
      color: var(--muted);
      font-size: 13px;
    }
    .model-field {
      display: grid;
      gap: 4px;
      min-width: 180px;
      flex: 1 1 210px;
    }
    .model-field.compact { flex: 0 1 190px; }
    .model-field.codex-model-field {
      flex: 1 1 300px;
      min-width: min(100%, 280px);
    }
    .model-field.custom-model-field {
      flex: 1 1 240px;
      min-width: min(100%, 220px);
    }
    .model-field.is-hidden {
      display: none;
    }
    .model-field.is-disabled {
      opacity: 0.46;
    }
    .model-field.is-disabled input,
    .model-field.is-disabled select {
      cursor: not-allowed;
    }
    .model-field span {
      color: var(--muted);
      font-size: 12px;
    }
    .filters {
      margin: 0 0 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }
    .filters input { max-width: 360px; }
    .summary {
      margin: 0 0 14px;
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
    }
    .assistant-prompt {
      margin: 0 0 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .assistant-prompt[hidden] { display: none; }
    .assistant-prompt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .assistant-prompt-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    .assistant-prompt-title {
      color: var(--text);
      font-weight: 700;
    }
    .assistant-prompt textarea {
      width: 100%;
      min-height: 128px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
      background: var(--input);
      color: var(--text);
      font: 13px/1.5 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }
    .assistant-prompt textarea[readonly] {
      color: var(--muted);
    }
    .list {
      display: grid;
      gap: 10px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 24px var(--shadow);
      overflow: hidden;
    }
    .card-main {
      display: grid;
      grid-template-columns: 38px minmax(180px, 0.9fr) minmax(280px, 1.4fr) minmax(190px, 0.8fr);
      gap: 12px;
      padding: 14px;
      align-items: start;
    }
    .use-cell {
      display: flex;
      justify-content: center;
      padding-top: 5px;
    }
    .host {
      color: var(--text);
      font-weight: 680;
      margin-bottom: 4px;
      word-break: break-word;
    }
    .thread-id {
      color: var(--muted);
      font-size: 12px;
      word-break: break-all;
    }
    .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin: 0 0 5px;
    }
    .old-title {
      color: var(--muted);
      font-size: 15px;
      word-break: break-word;
      margin-bottom: 10px;
    }
    .proposed-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .reason {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      word-break: break-word;
    }
    .status {
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 999px;
      display: inline-flex;
      border: 1px solid var(--line);
      color: var(--muted);
    }
    .state-cell {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .status.ok { color: var(--ok); border-color: rgba(116, 213, 140, 0.45); }
    .status.bad { color: var(--danger); border-color: rgba(255, 116, 107, 0.45); }
    .status.warn { color: var(--warn); border-color: rgba(245, 184, 95, 0.45); }
    details {
      border-top: 1px solid var(--line);
      background: var(--panel-2);
    }
    summary {
      cursor: pointer;
      color: var(--muted);
      padding: 10px 14px;
      font-size: 13px;
    }
    .advanced {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
      padding: 0 14px 14px;
    }
    .advanced .wide { grid-column: span 2; }
    .context-box {
      grid-column: 1 / -1;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--context-bg);
      color: var(--muted);
      padding: 10px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 150px;
      overflow: auto;
    }
    .advanced-actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .regen-state {
      color: var(--muted);
      font-size: 13px;
    }
    .empty {
      padding: 28px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    @media (max-width: 860px) {
      header, main { padding: 16px; }
      .card-main { grid-template-columns: 34px 1fr; }
      .title-cell, .proposal-cell, .state-cell { grid-column: 2; }
      .advanced { grid-template-columns: 1fr; }
      .advanced .wide { grid-column: auto; }
      .proposed-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <h1 id="pageTitle">Codex 会话重命名审核</h1>
      <div class="prefs">
        <button id="themeToggle" type="button"></button>
        <button id="langToggle" type="button"></button>
      </div>
    </div>
    <div class="meta" id="meta"></div>
  </header>
  <main>
    <div class="toolbar main-toolbar">
      <button id="startReview" class="primary">开始审核 / Start review</button>
      <button id="approveAll">批准有效改名 / Approve valid changes</button>
      <button id="rejectAll">全部拒绝 / Reject all</button>
      <button id="submitApprovals" class="primary">提交审核结果 / Submit approvals</button>
      <button id="checkDesktopStatus">检查桌面应用状态 / Check Desktop status</button>
    </div>
    <section class="config-panel" aria-label="AI and remote session configuration">
      <div class="config-row">
        <span class="group-title" id="modelToolsLabel">模型 / Model</span>
        <label class="model-field compact">
          <span id="modelBackendLabel">Backend</span>
          <select id="modelBackend">
            <option value="openai">OpenAI API</option>
            <option value="codex">Codex subagent</option>
          </select>
        </label>
        <label class="model-field">
          <span id="openaiBaseUrlLabel">OpenAI Base URL</span>
          <input id="openaiBaseUrl" type="text" autocomplete="off">
        </label>
        <label class="model-field compact">
          <span id="openaiModelLabel">OpenAI Model</span>
          <input id="openaiModel" type="text" autocomplete="off">
        </label>
        <label class="model-field compact">
          <span id="openaiApiKeyLabel">API Key</span>
          <input id="openaiApiKey" type="password" autocomplete="off">
        </label>
        <label class="model-field codex-model-field">
          <span id="codexModelLabel">Codex Model</span>
          <select id="codexModel">
            <option value="gpt-5.3-codex-spark">gpt-5.3-codex-spark</option>
            <option value="gpt-5.4-mini">gpt-5.4-mini</option>
            <option value="gpt-5.3-codex">gpt-5.3-codex</option>
            <option value="gpt-5.4">gpt-5.4</option>
            <option value="gpt-5.5">gpt-5.5</option>
            <option value="__custom__">Custom...</option>
          </select>
        </label>
        <label class="model-field custom-model-field is-hidden" id="codexModelCustomWrap">
          <span id="codexModelCustomLabel">Custom Codex model</span>
          <input id="codexModelCustom" type="text" autocomplete="off">
        </label>
        <label class="model-field codex-model-field">
          <span id="codexFallbackModelLabel">Codex Fallback</span>
          <select id="codexFallbackModel">
            <option value="gpt-5.4-mini">gpt-5.4-mini</option>
            <option value="gpt-5.3-codex-spark">gpt-5.3-codex-spark</option>
            <option value="gpt-5.3-codex">gpt-5.3-codex</option>
            <option value="gpt-5.4">gpt-5.4</option>
            <option value="gpt-5.5">gpt-5.5</option>
            <option value="__custom__">Custom...</option>
          </select>
        </label>
        <label class="model-field custom-model-field is-hidden" id="codexFallbackCustomWrap">
          <span id="codexFallbackCustomLabel">Custom fallback</span>
          <input id="codexFallbackCustom" type="text" autocomplete="off">
        </label>
      </div>
      <div class="config-row">
        <span class="group-title" id="remoteSessionsLabel">远程会话 / Remote</span>
        <div id="remoteHostList" class="remote-host-list"></div>
        <label class="model-field remote-host-manual">
          <span id="remoteManualLabel">其他 SSH Host</span>
          <input id="remoteManualHosts" type="text" autocomplete="off">
        </label>
      </div>
    </section>
    <details class="tool-drawer">
      <summary id="advancedToolsSummary">高级工具 / Advanced tools</summary>
      <div class="tool-drawer-body">
        <div class="tool-group">
          <span class="group-title" id="exportToolsLabel">导出</span>
          <button id="download">下载 approved.json / Download approved.json</button>
          <button id="saveFile">保存 approved.json / Save approved.json</button>
          <button id="prepareDesktopApply">生成桌面应用请求 / Prepare Desktop apply</button>
        </div>
        <div class="tool-group">
          <span class="group-title" id="aiToolsLabel">AI 重写</span>
          <button id="requestSubagent">请求子agent重生成已勾选 / Request subagent</button>
          <button id="checkSubagentStatus">检查子agent结果 / Check subagent</button>
        </div>
        <div class="tool-group">
          <span class="group-title" id="fallbackToolsLabel">Fallback</span>
          <button id="applyRemoteAppServer">应用远程改名 / Apply remote renames</button>
          <button id="applyRemoteState">直接刷新远程状态 / Direct remote state</button>
          <button id="applyRemoteIndex">应用远程索引 / Apply remote index</button>
        </div>
      </div>
    </details>
    <div class="summary" id="notice" aria-live="polite"></div>
    <div class="summary" id="summary"></div>
    <section id="assistantPromptPanel" class="assistant-prompt" hidden>
      <div class="assistant-prompt-header">
        <div class="assistant-prompt-title" id="assistantPromptTitle">给 Codex 的提示词</div>
        <div class="assistant-prompt-actions">
          <button id="editAssistantPrompt" type="button">编辑</button>
          <button id="resetAssistantPrompt" type="button">初始化</button>
          <button id="copyAssistantPrompt" type="button">复制</button>
        </div>
      </div>
      <textarea id="assistantPromptText" readonly></textarea>
    </section>
    <div class="filters">
      <input type="text" id="search" placeholder="搜索标题、主机或理由 / Search title, host, reason">
      <select id="filter">
        <option value="needsAction">待处理 / Needs action</option>
        <option value="all">全部 / All</option>
        <option value="applied">已应用 / Applied</option>
        <option value="skippedApply">已跳过 / Skipped</option>
        <option value="unavailable">旧批次/不可见 / Old batch</option>
        <option value="approved">已批准 / Approved</option>
        <option value="rejected">已拒绝 / Rejected</option>
        <option value="invalid">无效 / Invalid</option>
        <option value="changed">有变化 / Changed</option>
      </select>
    </div>
    <div id="tableWrap"></div>
  </main>
  <script id="session-renamer-data" type="application/json">__SESSION_RENAMER_DATA__</script>
  <script>
    const payload = JSON.parse(document.getElementById("session-renamer-data").textContent);
    const run = payload.proposal_run || {};
    const serverMode = location.protocol === "http:" || location.protocol === "https:";
    const remoteHostCandidates = Array.isArray(payload.remote_host_candidates) ? payload.remote_host_candidates : [];
    const proposals = (run.proposals || []).map((item) => {
      return {
        ...item,
        approved: false,
        edited: false,
        reviewOptions: { length: "standard", style: "descriptive", custom_size: "", instruction: "" },
        regenState: ""
      };
    });
    const applyStatusByThread = new Map();
    let desktopApply = { state: "unknown", applied: 0, failed: 0, skipped: 0 };
    let assistantPromptText = "";
    let assistantPromptSeed = null;
    let assistantPromptEditable = false;
    let assistantPromptEdited = false;
    const modelConfig = {
      backend: localStorage.getItem("sessionRenamer.modelBackend") || "openai",
      openai_base_url: localStorage.getItem("sessionRenamer.openaiBaseUrl") || "http://127.0.0.1:8000/v1",
      openai_model: localStorage.getItem("sessionRenamer.openaiModel") || "",
      openai_api_key: "",
      codex_model: localStorage.getItem("sessionRenamer.codexModel") || "gpt-5.3-codex-spark",
      codex_fallback_model: localStorage.getItem("sessionRenamer.codexFallbackModel") || "gpt-5.4-mini"
    };
    const remoteConfig = {
      selected: new Set((localStorage.getItem("sessionRenamer.remoteHosts") || "").split(",").map((item) => item.trim()).filter(Boolean)),
      manual: localStorage.getItem("sessionRenamer.remoteManualHosts") || ""
    };
    const codexModelChoices = ["gpt-5.3-codex-spark", "gpt-5.4-mini", "gpt-5.3-codex", "gpt-5.4", "gpt-5.5"];
    const i18n = {

    function t(key, vars = {}) {
      let text = (i18n[currentLang] && i18n[currentLang][key]) || i18n.en[key] || key;
      Object.entries(vars).forEach(([name, value]) => {
        text = text.replaceAll(`{${name}}`, String(value));
      });
      return text;
    }

    function setNotice(key, vars = {}) {
      notice = { key, vars };
    }

    function noticeText() {
      return t(notice.key, notice.vars);
    }

    function codexModelValue(selectId, customId, fallback) {
      const select = document.getElementById(selectId);
      const custom = document.getElementById(customId);
      if (select.value === "__custom__") return custom.value.trim() || fallback;
      return select.value || fallback;
    }

    function setCodexModelValue(selectId, customId, value, fallback) {
      const select = document.getElementById(selectId);
      const custom = document.getElementById(customId);
      const text = String(value || fallback).trim();
      if (codexModelChoices.includes(text)) {
        select.value = text;
        custom.value = "";
      } else {
        select.value = "__custom__";
        custom.value = text;
      }
    }

    function refreshCustomModelFields() {
      const customModel = document.getElementById("codexModel").value === "__custom__";
      const customFallback = document.getElementById("codexFallbackModel").value === "__custom__";
      document.getElementById("codexModelCustomWrap").classList.toggle("is-hidden", !customModel);
      document.getElementById("codexFallbackCustomWrap").classList.toggle("is-hidden", !customFallback);
    }

    function setFieldDisabled(id, disabled) {
      const field = document.getElementById(id).closest(".model-field");
      document.getElementById(id).disabled = disabled;
      if (field) field.classList.toggle("is-disabled", disabled);
    }

    function applyModelBackendState() {
      const backend = document.getElementById("modelBackend").value || "openai";
      const openaiDisabled = backend !== "openai";
      const codexDisabled = backend !== "codex";
      ["openaiBaseUrl", "openaiModel", "openaiApiKey"].forEach((id) => setFieldDisabled(id, openaiDisabled));
      ["codexModel", "codexFallbackModel", "codexModelCustom", "codexFallbackCustom"].forEach((id) => setFieldDisabled(id, codexDisabled));
      refreshCustomModelFields();
      const customModelDisabled = codexDisabled || document.getElementById("codexModel").value !== "__custom__";
      const customFallbackDisabled = codexDisabled || document.getElementById("codexFallbackModel").value !== "__custom__";
      setFieldDisabled("codexModelCustom", customModelDisabled);
      setFieldDisabled("codexFallbackCustom", customFallbackDisabled);
      document.getElementById("requestSubagent").disabled = codexDisabled;
    }

    function normalizeOpenAIBaseUrl(value) {
      let text = String(value || "").trim() || "http://127.0.0.1:8000/v1";
      if (!/^[A-Za-z][A-Za-z0-9+.-]*:\/\//.test(text)) {
        text = `http://${text}`;
      }
      try {
        const url = new URL(text);
        const parts = url.pathname.split("/").filter(Boolean);
        if (parts.length >= 2 && parts[parts.length - 2] === "chat" && parts[parts.length - 1] === "completions") {
          parts.splice(parts.length - 2, 2);
        }
        while (parts.length && ["models", "completions"].includes(parts[parts.length - 1])) {
          parts.pop();
        }
        if (!parts.length || parts[parts.length - 1] !== "v1") {
          parts.push("v1");
        }
        url.pathname = `/${parts.join("/")}`;
        url.search = "";
        url.hash = "";
        return url.toString().replace(/\/$/, "");
      } catch (_) {
        return text;
      }
    }

    function modelConfigData() {
      return {
        backend: document.getElementById("modelBackend").value || "openai",
        openai_base_url: normalizeOpenAIBaseUrl(document.getElementById("openaiBaseUrl").value),
        openai_model: document.getElementById("openaiModel").value.trim(),
        openai_api_key: document.getElementById("openaiApiKey").value,
        codex_model: codexModelValue("codexModel", "codexModelCustom", "gpt-5.3-codex-spark"),
        codex_fallback_model: codexModelValue("codexFallbackModel", "codexFallbackCustom", "gpt-5.4-mini")
      };
    }

    function applyModelConfigToFields() {
      document.getElementById("modelBackend").value = modelConfig.backend === "codex" ? "codex" : "openai";
      document.getElementById("openaiBaseUrl").value = normalizeOpenAIBaseUrl(modelConfig.openai_base_url);
      document.getElementById("openaiModel").value = modelConfig.openai_model;
      document.getElementById("openaiApiKey").value = modelConfig.openai_api_key;
      document.getElementById("remoteManualHosts").value = remoteConfig.manual;
      setCodexModelValue("codexModel", "codexModelCustom", modelConfig.codex_model, "gpt-5.3-codex-spark");
      setCodexModelValue("codexFallbackModel", "codexFallbackCustom", modelConfig.codex_fallback_model, "gpt-5.4-mini");
      applyModelBackendState();
    }

    function saveModelConfigFromFields() {
      const config = modelConfigData();
      modelConfig.backend = config.backend;
      modelConfig.openai_base_url = config.openai_base_url;
      modelConfig.openai_model = config.openai_model;
      modelConfig.openai_api_key = config.openai_api_key;
      modelConfig.codex_model = config.codex_model;
      modelConfig.codex_fallback_model = config.codex_fallback_model;
      localStorage.setItem("sessionRenamer.modelBackend", config.backend);
      localStorage.setItem("sessionRenamer.openaiBaseUrl", config.openai_base_url);
      localStorage.setItem("sessionRenamer.openaiModel", config.openai_model);
      localStorage.setItem("sessionRenamer.codexModel", config.codex_model);
      localStorage.setItem("sessionRenamer.codexFallbackModel", config.codex_fallback_model);
      applyModelBackendState();
    }

    function normalizeOpenAIBaseUrlField() {
      const field = document.getElementById("openaiBaseUrl");
      field.value = normalizeOpenAIBaseUrl(field.value);
      saveModelConfigFromFields();
    }

    function splitHostText(value) {
      return String(value || "").split(/[\s,;]+/).map((item) => item.trim()).filter(Boolean);
    }

    function selectedRemoteHosts() {
      const hosts = new Set(remoteConfig.selected);
      splitHostText(document.getElementById("remoteManualHosts").value).forEach((host) => hosts.add(host));
      return Array.from(hosts);
    }

    function saveRemoteConfigFromFields() {
      remoteConfig.manual = document.getElementById("remoteManualHosts").value.trim();
      localStorage.setItem("sessionRenamer.remoteHosts", Array.from(remoteConfig.selected).join(","));
      localStorage.setItem("sessionRenamer.remoteManualHosts", remoteConfig.manual);
    }

    function renderRemoteHostList() {
      const list = document.getElementById("remoteHostList");
      list.innerHTML = "";
      if (!remoteHostCandidates.length) {
        const empty = document.createElement("span");
        empty.className = "pill";
        empty.textContent = t("remoteNoHosts");
        list.appendChild(empty);
        return;
      }
      remoteHostCandidates.forEach((host) => {
        const label = document.createElement("label");
        label.className = "remote-host-option";
        const input = document.createElement("input");
        input.type = "checkbox";
        input.checked = remoteConfig.selected.has(host);
        input.addEventListener("change", () => {
          if (input.checked) remoteConfig.selected.add(host);
          else remoteConfig.selected.delete(host);
          saveRemoteConfigFromFields();
        });
        const text = document.createElement("span");
        text.textContent = host;
        label.append(input, text);
        list.appendChild(label);
      });
    }

        [t("metaCount"), String(proposals.length)],
        [t("metaCache"), String(run.cache_hits || 0)],

        [t("metaBackup"), payload.maintenance && payload.maintenance.backup_file ? t("yes") : t("none")]
      ].forEach(([label, value]) => {
        const span = document.createElement("span");
        span.className = "pill";
        span.textContent = `${label}: ${value}`;
        meta.appendChild(span);
      });
    }

      document.getElementById("codexFallbackCustom").placeholder = t("customCodexFallbackPlaceholder");
      document.getElementById("fallbackToolsLabel").textContent = t("fallbackTools");
      document.getElementById("assistantPromptTitle").textContent = t("assistantPromptTitle");
      document.getElementById("editAssistantPrompt").textContent = assistantPromptEditable ? t("lockPrompt") : t("editPrompt");
      document.getElementById("resetAssistantPrompt").textContent = t("resetPrompt");
      document.getElementById("copyAssistantPrompt").textContent = t("copyPrompt");
      document.getElementById("search").placeholder = t("searchPlaceholder");
      const filter = document.getElementById("filter");
      const labels = {
        needsAction: "filterNeedsAction",
        all: "filterAll",
        applied: "filterApplied",
        skippedApply: "filterSkippedApply",
        unavailable: "filterUnavailable",
        approved: "filterApproved",
        rejected: "filterRejected",
        invalid: "filterInvalid",
        changed: "filterChanged"
      };
      [...filter.options].forEach((option) => { option.textContent = t(labels[option.value]); });
      renderRemoteHostList();
      renderMeta();
    }

    function changed(item) {
      return String(item.oldTitle || "").trim() !== String(item.newTitle || "").trim();
    }

    function applyState(item) {
      const status = applyStatusByThread.get(item.threadId);
      return status ? status.state : "pending";
    }

    function applyReason(item) {
      const status = applyStatusByThread.get(item.threadId);
      return status ? String(status.reason || "") : "";
    }

    function isUnavailableSkipped(item) {
      const reason = applyReason(item);
      return applyState(item) === "skipped" && /No AppServerManager registered/i.test(reason);
    }

    function needsAction(item) {
      const state = applyState(item);
      if (desktopApply.state === "completed") {
        if (isUnavailableSkipped(item)) return false;
        return state === "failed";
      }
      return Boolean(item.valid) && changed(item);
    }

    function visibleProposals() {
      const term = document.getElementById("search").value.trim().toLowerCase();
      const filter = document.getElementById("filter").value;
      return proposals
        .map((item, index) => ({ item, index }))
        .filter(({ item }) => {
          const state = applyState(item);
          if (filter === "needsAction" && !needsAction(item)) return false;
          if (filter === "applied" && state !== "applied") return false;
          if (filter === "skippedApply" && state !== "skipped") return false;
          if (filter === "unavailable" && !isUnavailableSkipped(item)) return false;
          if (filter === "approved" && !item.approved) return false;
          if (filter === "rejected" && item.approved) return false;
          if (filter === "invalid" && item.valid) return false;
          if (filter === "changed" && !changed(item)) return false;
          if (!term) return true;
          return [item.host, item.oldTitle, item.newTitle, item.reason, item.threadId]
            .some((value) => String(value || "").toLowerCase().includes(term));
        });
    }

    function updateSummary() {
      const approvedCount = proposals.filter((p) => p.approved).length;
      const changedCount = proposals.filter(changed).length;
      const invalidCount = proposals.filter((p) => !p.valid).length;
      document.getElementById("notice").textContent = noticeText();
      let summaryText = t("summary", {
        approved: approvedCount,
        changed: changedCount,
        invalid: invalidCount
      });
      if (desktopApply.state === "completed") {
        summaryText += " " + t("summaryApply", {
          applied: desktopApply.applied,
          skipped: desktopApply.skipped,
          failed: desktopApply.failed
        });
        if (document.getElementById("filter").value === "needsAction") {
          summaryText += " " + t("summaryHidden");
        }
      }
      document.getElementById("summary").textContent = summaryText;
    }

    function renderAssistantPrompt() {
      const panel = document.getElementById("assistantPromptPanel");
      const textArea = document.getElementById("assistantPromptText");
      const editButton = document.getElementById("editAssistantPrompt");
      const resetButton = document.getElementById("resetAssistantPrompt");
      if (!assistantPromptText) {
        panel.hidden = true;
        textArea.value = "";
        textArea.readOnly = true;
        editButton.disabled = true;
        resetButton.disabled = true;
        return;
      }
      panel.hidden = false;
      textArea.value = assistantPromptText;
      textArea.readOnly = !assistantPromptEditable;
      editButton.disabled = false;
      resetButton.disabled = !assistantPromptSeed;
      editButton.textContent = assistantPromptEditable ? t("lockPrompt") : t("editPrompt");
      resetButton.textContent = t("resetPrompt");
    }

    function buildAssistantPromptFromSeed(seed) {
      if (!seed || !seed.kind) return "";
      if (seed.kind === "startReview") return buildStartReviewPrompt(seed.options || {});
      if (seed.kind === "codexSubagent") return buildCodexSubagentPrompt(seed.options || {});
      if (seed.kind === "desktopApply") return buildDesktopApplyPrompt(seed.options || {});
      if (seed.kind === "desktopResult") return buildDesktopResultPrompt(seed.options || {});
      return "";
    }

    function setAssistantPrompt(text, seed = null) {
      assistantPromptText = String(text || "").trim();
      assistantPromptSeed = seed;
      assistantPromptEditable = false;
      assistantPromptEdited = false;
      renderAssistantPrompt();
    }

    function resetAssistantPromptFromSeed() {
      const nextText = buildAssistantPromptFromSeed(assistantPromptSeed);
      if (!nextText) return;
      assistantPromptText = nextText;
      assistantPromptEditable = false;
      assistantPromptEdited = false;
      setNotice("promptReset");
      applyPreferences();
      renderAssistantPrompt();
      updateSummary();
    }

    function syncAssistantPromptLanguage() {
      if (!assistantPromptSeed || assistantPromptEdited) return;
      const nextText = buildAssistantPromptFromSeed(assistantPromptSeed);
      if (!nextText) return;
      assistantPromptText = nextText;
      renderAssistantPrompt();
    }

    function selectAssistantPromptText(textArea) {
      textArea.readOnly = false;
      textArea.focus();
      textArea.select();
      if (typeof textArea.setSelectionRange === "function") {
        textArea.setSelectionRange(0, textArea.value.length);
      }
      textArea.readOnly = !assistantPromptEditable;
    }

    function execCommandCopyFromElement(textArea) {
      selectAssistantPromptText(textArea);
      return document.execCommand("copy") === true;
    }

    function execCommandCopyFromScratch(text) {
      const scratch = document.createElement("textarea");
      scratch.value = text;
      scratch.setAttribute("aria-hidden", "true");
      scratch.style.position = "fixed";
      scratch.style.left = "-9999px";
      scratch.style.top = "0";
      scratch.style.width = "1px";
      scratch.style.height = "1px";
      scratch.style.opacity = "0";
      document.body.appendChild(scratch);
      scratch.focus();
      scratch.select();
      if (typeof scratch.setSelectionRange === "function") {
        scratch.setSelectionRange(0, scratch.value.length);
      }
      const copied = document.execCommand("copy") === true;
      scratch.remove();
      return copied;
    }

    async function copyTextToClipboard(textArea) {
      const text = textArea.value;
      if (!text) return false;
      if (window.navigator?.clipboard && window.isSecureContext) {
        await window.navigator.clipboard.writeText(text);
        return true;
      }
      try {
        if (execCommandCopyFromElement(textArea)) return true;
      } catch (_) {
        // Try the scratch element below.
      }
      return execCommandCopyFromScratch(text);
    }

    function firstText(...values) {
      for (const value of values) {
        if (typeof value === "string" && value.trim()) return value.trim();
      }
      return "";
    }

    function inferCurrentDir() {
      const explicit = firstText(payload.current_dir);
      if (explicit) return explicit;
      const paths = payload.paths && typeof payload.paths === "object" ? payload.paths : {};
      const pathValue = firstText(paths.desktop_apply_request, paths.start_review_request, paths.review, payload.proposals_file);
      if (pathValue && /[\\\/]/.test(pathValue)) {
        return pathValue.replace(/[\\\/][^\\\/]+$/, "");
      }
      return "%USERPROFILE%\\.codex\\tmp\\session-renamer\\current";
    }

    function pathFromPayload(key, fileName) {
      const paths = payload.paths && typeof payload.paths === "object" ? payload.paths : {};
      const explicit = firstText(paths[key]);
      if (explicit) return explicit;
      return `${inferCurrentDir().replace(/[\\\/]+$/, "")}\\${fileName}`;
    }

    function optionPath(options, camelName, snakeName, payloadKey, fileName) {
      return firstText(options[camelName], options[snakeName], pathFromPayload(payloadKey, fileName));
    }

    function reviewServerUrl(options = {}) {
      const explicit = firstText(options.serverUrl, options.server_url, payload.review_server_url);
      if (explicit) return explicit.replace(/\/+$/, "/");
      if (serverMode && location.origin) return `${location.origin}/`;
      return "http://127.0.0.1:8765/";
    }

    function buildStartReviewPrompt(options = {}) {
      const requestPath = optionPath(options, "requestPath", "request_path", "start_review_request", "start_review_request.json");
      const backend = options.backend || options.backend_config?.backend || "openai";
      const modelText = backend === "codex"
        ? `${options.backend_config?.codex_model || "gpt-5.3-codex-spark"} / ${options.backend_config?.codex_fallback_model || "gpt-5.4-mini"}`
        : `${options.backend_config?.openai_base_url || "http://127.0.0.1:8000/v1"} ${options.backend_config?.openai_model || "(auto model)"}`;
      const remoteHosts = options.remote_hosts || options.remoteHosts || [];
      const remoteText = Array.isArray(remoteHosts) && remoteHosts.length ? remoteHosts.join(", ") : "-";
      const serverUrl = reviewServerUrl(options);
      if (currentLang === "en") {
        return [
          "Please start a fresh Codex session rename review from the web UI request.",
          `Read ${requestPath}.`,
          "Collect the current Desktop-visible local threads with codex_app.list_threads, save them as local_threads.json, then run the skill workflow: maintenance, discover, propose, and render-review.",
          `Selected backend: ${backend}; model settings: ${modelText}.`,
          `Selected remote SSH hosts: ${remoteText}.`,
          "Do not apply any rename yet. Only generate a fresh review page.",
          `When the new review.html is ready, restart or refresh the local review server on ${serverUrl} and tell me to refresh the browser.`
        ].join("\n");
      }
      return [
        "请从网页请求开始一轮新的 Codex session 重命名审核。",
        `请读取 ${requestPath}。`,
        "先用 codex_app.list_threads 拉取当前 Desktop 可见的本地会话，保存为 local_threads.json，然后执行这个 skill 的流程：maintenance、discover、propose、render-review。",
        `已选择后端：${backend}；模型设置：${modelText}。`,
        `已勾选远程 SSH Host：${remoteText}。`,
        "这一步不要应用任何改名，只生成新的审核页。",
        `新的 review.html 准备好后，请重启或刷新本地审核服务 ${serverUrl}，然后告诉我刷新浏览器。`
      ].join("\n");
    }

    function buildCodexSubagentPrompt(options = {}) {
      const requestPath = optionPath(options, "requestPath", "request_path", "start_review_request", "start_review_request.json");
      const promptPath = optionPath(options, "promptPath", "prompt_path", "subagent_prompt", "subagent_prompt.txt");
      const manifestPath = firstText(options.manifestPath, options.manifest_path, pathFromPayload("subagent_manifest", "subagent_manifest.json"));
      const resultDir = firstText(options.resultDir, options.result_dir, pathFromPayload("subagent_results", "subagent_results"));
      const chunkCount = options.chunkCount || options.chunk_count || "";
      const nextCommand = options.nextCommand || options.next_command || "";
      const commandsPath = firstText(options.commandsPath, options.commands_path, pathFromPayload("agent_review_commands", "agent_review_commands.md"));
      const backendConfig = options.backend_config || {};
      const modelText = `${backendConfig.codex_model || "gpt-5.3-codex-spark"} / ${backendConfig.codex_fallback_model || "gpt-5.4-mini"}`;
      const remoteHosts = options.remote_hosts || options.remoteHosts || [];
      const remoteText = Array.isArray(remoteHosts) && remoteHosts.length ? remoteHosts.join(", ") : "-";
      const commandLine = nextCommand ? `\n${nextCommand}` : "";
      const commandHint = commandsPath ? `\n参考命令文件：${commandsPath}` : "";
      if (currentLang === "en") {
        return [
          "Please continue the Codex session rename review that I started from the web UI.",
          `Read the request: ${requestPath}.`,
          `Read the generated handoff prompt: ${promptPath}.`,
          manifestPath ? `Read the chunk manifest: ${manifestPath}.` : "",
          `Use Codex subagent proposals with model preference: ${modelText}.`,
          `Selected remote SSH hosts: ${remoteText}.`,
          chunkCount ? `Spawn subagents for ${chunkCount} prompt chunks; save each JSON-only reply to its result_path under ${resultDir || "subagent_results"}.` : "Spawn subagents for each prompt chunk and save each JSON-only reply to its result_path.",
          "Run merge-subagent to create subagent_proposals.json, then rerun agent-review with that JSON.",
          nextCommand ? `Rerun command:${commandLine}` : "If no rerun command is available, use agent-review --backend subagent --subagent-json subagent_proposals.json.",
          "Do not apply any rename yet. Only regenerate review.html and refresh the local review server.",
          commandsPath ? `Command notes: ${commandsPath}` : ""
        ].filter(Boolean).join("\n");
      }
      return [
        "请继续我刚刚在网页里发起的 Codex session 重命名审核。",
        `请读取请求文件：${requestPath}。`,
        `请读取已生成的子 agent handoff 提示词：${promptPath}。`,
        manifestPath ? `请读取分块清单：${manifestPath}。` : "",
        `使用 Codex 子 agent 生成建议，模型优先级：${modelText}。`,
        `已勾选远程 SSH Host：${remoteText}。`,
        chunkCount ? `请按清单为 ${chunkCount} 个 prompt chunk 分别触发子 agent，把每个 JSON-only 回复保存到对应 result_path（目录：${resultDir || "subagent_results"}）。` : "请按清单为每个 prompt chunk 分别触发子 agent，并保存每个 JSON-only 回复。",
        "然后运行 merge-subagent 合并为 subagent_proposals.json，再带这个 JSON 重新运行 agent-review。",
        nextCommand ? `重跑命令：${commandLine}` : "如果没有现成命令，请使用 agent-review --backend subagent --subagent-json subagent_proposals.json。",
        "这一步不要应用任何改名，只重新生成 review.html 并刷新本地审核服务。",
        commandHint.trim()
      ].filter(Boolean).join("\n");
    }

    function buildDesktopApplyPrompt(options = {}) {
      const requestPath = optionPath(options, "requestPath", "request_path", "desktop_apply_request", "desktop_apply_request.json");
      const resultPath = optionPath(options, "resultPath", "result_path", "desktop_apply_result", "desktop_apply_result.json");
      const count = options.count ?? options.apply_count ?? options.desktop_apply_count ?? "";
      const skipped = options.skip ?? options.skip_count ?? "";
      const hosts = options.hosts || hostSummaryText(options.countsByHost || options.desktop_counts_by_host);
      if (currentLang === "en") {
        return [
          "I reviewed and submitted the Codex session rename approvals in the web UI.",
          `Please read ${requestPath} and apply the approved items.`,
          "Do not regenerate titles; use the submitted newTitle values directly.",
          "For each item, call codex_app.set_thread_title with threadId and newTitle so the current Desktop sidebar receives the live update.",
          `When finished, write ${resultPath} with applied, failed, skipped, and created_at, then summarize the result.`,
          "If a thread returns No AppServerManager registered, record it as skipped and continue with the rest.",
          count !== "" ? `Requested apply items: ${count}; submit-time skipped items: ${skipped || 0}; hosts: ${hosts || "-"}.` : ""
        ].filter(Boolean).join("\n")
      }
      return [
        "我已经在网页里审核并提交了 Codex session 重命名请求。",
        `请读取 ${requestPath}，按里面的 items 执行已批准的改名。`,
        "不要重新生成标题，直接使用提交的 newTitle。",
        "请逐条调用 codex_app.set_thread_title，参数是 threadId 和 newTitle，这样当前 Codex Desktop 侧栏会收到实时刷新。",
        `完成后请写回 ${resultPath}，包含 applied、failed、skipped、created_at，并告诉我结果。`,
        "如果某条返回 No AppServerManager registered，请记录为 skipped，继续处理其它项。",
        count !== "" ? `本次请求可应用 ${count} 条；提交时跳过 ${skipped || 0} 条；host 汇总：${hosts || "-"}。` : ""
      ].filter(Boolean).join("\n");
    }

    function buildDesktopResultPrompt(data) {
      const info = data || {};
      const resultPath = optionPath(info, "resultPath", "result_path", "desktop_apply_result", "desktop_apply_result.json");
      const applied = info.applied_count || 0;
      const failed = info.failed_count || 0;
      const skipped = info.skipped_count || 0;
      if (currentLang === "en") {
        return [
          "Please inspect the Codex session rename result from the web UI.",
          `Read ${resultPath}.`,
          `Current result: ${applied} applied, ${skipped} skipped, ${failed} failed.`,
          "If there are skipped items, explain why they were skipped and suggest the safest next action."
        ].join("\n");
      }
      return [
        "请检查网页里的 Codex session 重命名执行结果。",
        `请读取 ${resultPath}。`,
        `当前结果：已应用 ${applied} 条，跳过 ${skipped} 条，失败 ${failed} 条。`,
        "如果还有 skipped，请说明为什么跳过，以及下一步最安全的处理方式。"
      ].join("\n");
    }

    function contextText(item) {
      const context = item.context || {};
      const lines = [];
      if (context.cwd_basename || context.cwd) lines.push(`cwd: ${context.cwd_basename || context.cwd}`);
      if (context.preview) lines.push(`preview: ${context.preview}`);
      if (context.context) lines.push(`context: ${context.context}`);
      return lines.join("\n\n") || t("noContext");
    }

    function makeField(labelText, control) {
      const wrap = document.createElement("label");
      const label = document.createElement("span");
      label.className = "label";
      label.textContent = labelText;
      wrap.append(label, control);
      return wrap;
    }

      const wrap = document.getElementById("tableWrap");
      const items = visibleProposals();

        check.checked = Boolean(item.approved);

        const titleCell = document.createElement("div");

        oldTitle.className = "old-title";
        oldTitle.textContent = item.oldTitle || "";
        const threadId = document.createElement("div");

        threadId.textContent = item.threadId || "";
        titleCell.append(host, oldLabel, oldTitle, threadId);

        proposalCell.className = "proposal-cell";

        proposalRow.className = "proposed-row";

        input.type = "text";

        input.addEventListener("input", () => {
          item.newTitle = input.value;
          item.edited = true;
          setNotice("editedNotice");
          updateSummary();
        });
        const quickApprove = document.createElement("button");

          render();
        });
        proposalRow.append(input, quickApprove);

        stateCell.className = "state-cell";

        if (!changed(item) && item.valid) status.className = "status warn";

          ? (changed(item) ? t("validChange") : t("noChange"))

        stateCell.appendChild(status);
        const applyStatus = applyStatusByThread.get(item.threadId);
        if (applyStatus) {
          const applyBadge = document.createElement("span");
          const unavailableSkipped = isUnavailableSkipped(item);

          applyBadge.textContent = applyStatus.state === "applied"
            ? t("appliedBadge")

              ? t("failedBadge")
              : unavailableSkipped
                ? t("unavailableBadge")
                : t("skippedBadge");

          stateCell.appendChild(applyBadge);

        const regenState = document.createElement("span");
        regenState.className = "regen-state";
        regenState.textContent = item.regenState || "";
        regen.addEventListener("click", async () => {
          if (modelConfigData().backend !== "openai") return;
          regen.disabled = true;
          regenState.textContent = t("generating");
          try {
            const response = await fetch("/api/regenerate", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ session: item, options: item.reviewOptions, backendConfig: modelConfigData() })
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || response.statusText);
            const proposal = data.proposal || {};
            item.newTitle = proposal.newTitle || item.newTitle;
            item.reason = proposal.reason || item.reason;
            item.valid = Boolean(proposal.valid);
            item.validation = proposal.validation || "";
            item.backend = proposal.backend || item.backend;
            item.model = proposal.model || item.model;
            item.edited = true;
            item.regenState = t("regenerated");
            setNotice("regenNotice");
            render();
          } catch (error) {
            item.regenState = t("regenFailed", { message: error.message });
            regenState.textContent = item.regenState;
          } finally {
            regen.disabled = modelConfigData().backend !== "openai";
          }
        });
        advancedActions.append(regen, regenState);
        advanced.appendChild(advancedActions);
        details.append(summary, advanced);
        card.appendChild(details);
        list.appendChild(card);
      });
      wrap.replaceChildren(list);
    }

    function approvalData() {
      return {
        created_at: new Date().toISOString(),
        source: payload.proposals_file || "",

          threadId: item.threadId,
          host: item.host || "local",
          oldTitle: item.oldTitle || "",
          newTitle: item.newTitle || "",
          approved: Boolean(item.approved),
          edited: Boolean(item.edited),
          fingerprint: item.fingerprint || null,
          reviewOptions: item.reviewOptions || null
        }))
      };
    }

    function downloadJson() {
      const blob = new Blob([JSON.stringify(approvalData(), null, 2) + "\n"], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = payload.approved_file_name || "approved.json";
      link.click();
      URL.revokeObjectURL(url);
    }

    async function saveJson() {
      if (!window.showSaveFilePicker) {
        downloadJson();

      const handle = await window.showSaveFilePicker({
        suggestedName: payload.approved_file_name || "approved.json",
        types: [{ description: "JSON", accept: { "application/json": [".json"] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(JSON.stringify(approvalData(), null, 2) + "\n");
      await writable.close();

    function ingestApprovedData(data) {
      const approvals = data && Array.isArray(data.approvals) ? data.approvals : [];
      if (!approvals.length) return;
      const byThread = new Map(approvals.map((item) => [item.threadId, item]));
      proposals.forEach((item) => {
        const saved = byThread.get(item.threadId);
        if (!saved) return;
        item.approved = Boolean(saved.approved);
        item.edited = Boolean(saved.edited);
        if (typeof saved.newTitle === "string" && saved.newTitle.trim()) item.newTitle = saved.newTitle;
        if (saved.reviewOptions && typeof saved.reviewOptions === "object") {
          item.reviewOptions = { ...item.reviewOptions, ...saved.reviewOptions };
        }
      });
    }

      }

    function ingestDesktopApplyStatus(data) {
      applyStatusByThread.clear();
      if (!data || data.state !== "completed" || !data.result) {
        desktopApply = {
          state: data && data.state ? data.state : "unknown",
          applied: 0,
          failed: 0,
          skipped: 0
        };
        return;
      }
      const result = data.result || {};
      const applied = Array.isArray(result.applied) ? result.applied : [];
      const failed = Array.isArray(result.failed) ? result.failed : [];
      const skipped = Array.isArray(result.skipped) ? result.skipped : [];
      applied.forEach((record) => {
        if (record && record.threadId) applyStatusByThread.set(record.threadId, { state: "applied", reason: "" });
      });
      failed.forEach((record) => {
        if (record && record.threadId) applyStatusByThread.set(record.threadId, { state: "failed", reason: record.reason || record.error || "" });
      });
      skipped.forEach((record) => {
        if (record && record.threadId) applyStatusByThread.set(record.threadId, { state: "skipped", reason: record.reason || "" });
      });
      desktopApply = {
        state: "completed",
        applied: data.applied_count ?? applied.length,
        failed: data.failed_count ?? failed.length,
        skipped: data.skipped_count ?? skipped.length
      };
    }

    function checkedSubagentItems() {
      return proposals.filter((item) => item.approved).map((item) => ({

    function hasEmojiPrefixClient(title) {
      const text = String(title || "").trim();
      try {
        return /^\p{Extended_Pictographic}\uFE0F?\s/u.test(text);
      } catch (_) {
        return text.length >= 3 && /\s/.test(text.slice(1));
      }
    }

    function validateClientTitle(oldTitle, newTitle) {
      const text = String(newTitle || "").trim();
      if (!hasEmojiPrefixClient(text)) return "missing emoji prefix";
      const core = text.replace(/^\S+\s+/, "").trim();
      if (!core) return "empty title";
      if (core.length > 64) return "title too long";
      if (/https?:\/\/|[A-Za-z]:\\|\/home\/|\/Users\//.test(core)) return "contains path or URL";
      if (core === String(oldTitle || "").trim()) return "unchanged";
      return "";
    }

    function mergeSubagentRenames(result) {
      const renames = result && Array.isArray(result.renames) ? result.renames : [];
      let merged = 0;
      renames.forEach((rename) => {
        const threadId = String(rename.id || rename.threadId || "");
        const nextTitle = String(rename.new_title || rename.newTitle || "").trim();
        const item = proposals.find((candidate) => candidate.threadId === threadId);
        if (!item || !nextTitle) return;
        const validation = validateClientTitle(item.oldTitle, nextTitle);
        item.newTitle = nextTitle;
        item.reason = String(rename.reason || "Generated by Codex subagent.").slice(0, 240);
        item.valid = validation === "" || validation === "unchanged";
        item.validation = validation === "unchanged" ? "" : validation;
        item.backend = "subagent";
        item.edited = true;
        item.approved = false;
        merged += 1;
      });
      return merged;
    }
